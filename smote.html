<!DOCTYPE html>
<html>
<head>
  <title>SMOTE Professional Visualization</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }
    canvas {
      background: #fff;
      border: 1px solid #ccc;
      margin-top: 20px;
    }
    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>SMOTE Visualization (Spacious & Clean)</h2>
<p>Minority samples (red) are well distributed. SMOTE points (green) lie along connecting lines.</p>

<canvas id="canvas" width="700" height="520"></canvas><br>

<button onclick="applySMOTE()">Apply SMOTE</button>
<button onclick="reset()">Reset</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const padding = 60;
let minority = [];
let synthetic = [];

// Generate spaced points
function generateData(){
  minority = [];
  synthetic = [];

  for(let i=0;i<25;i++){
    let x = Math.random()*6 + 1;  // spread 1–7
    let y = Math.random()*6 + 1;

    // avoid tight clustering
    let valid = true;
    for(let p of minority){
      if(Math.hypot(p.x - x, p.y - y) < 0.8){
        valid = false;
        break;
      }
    }

    if(valid){
      minority.push({x,y});
    } else {
      i--; // retry
    }
  }

  draw();
}

// Scaling
function sx(x){ return padding + x*80; }
function sy(y){ return canvas.height - (padding + y*80); }

// Grid
function drawGrid(){
  ctx.strokeStyle="#eee";
  for(let i=1;i<=8;i++){
    ctx.beginPath();
    ctx.moveTo(padding + i*80, padding);
    ctx.lineTo(padding + i*80, canvas.height - padding);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(padding, padding + i*80);
    ctx.lineTo(canvas.width - padding, padding + i*80);
    ctx.stroke();
  }
}

// Axes
function drawAxes(){
  ctx.strokeStyle="#000";

  ctx.beginPath();
  ctx.moveTo(padding, canvas.height - padding);
  ctx.lineTo(canvas.width - padding, canvas.height - padding);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, canvas.height - padding);
  ctx.stroke();

  ctx.fillText("X", canvas.width - padding + 10, canvas.height - padding);
  ctx.fillText("Y", padding - 20, padding);
}

// Distance
function dist(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

// Nearest neighbor
function nearest(p){
  let best=null, min=Infinity;
  for(let q of minority){
    if(q===p) continue;
    let d=dist(p,q);
    if(d<min){min=d; best=q;}
  }
  return best;
}

// Draw point
function drawPoint(p,color,size=5){
  ctx.beginPath();
  ctx.arc(sx(p.x), sy(p.y), size, 0, 2*Math.PI);
  ctx.fillStyle=color;
  ctx.fill();
}

// Draw line
function drawLine(a,b){
  ctx.beginPath();
  ctx.moveTo(sx(a.x), sy(a.y));
  ctx.lineTo(sx(b.x), sy(b.y));
  ctx.strokeStyle="rgba(0,0,0,0.2)";
  ctx.stroke();
}

// Draw everything
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawGrid();
  drawAxes();

  // draw lines
  for(let p of minority){
    let n = nearest(p);
    drawLine(p,n);
  }

  // points
  minority.forEach(p=>drawPoint(p,"red",5));
  synthetic.forEach(p=>drawPoint(p,"green",5));
}

// SMOTE
function applySMOTE(){
  for(let i=0;i<40;i++){
    let p = minority[Math.floor(Math.random()*minority.length)];
    let n = nearest(p);

    let lambda = Math.random();

    let newP = {
      x: p.x + lambda*(n.x - p.x),
      y: p.y + lambda*(n.y - p.y)
    };

    synthetic.push(newP);
  }

  draw();
}

function reset(){
  generateData();
}

generateData();
</script>

</body>
</html>
